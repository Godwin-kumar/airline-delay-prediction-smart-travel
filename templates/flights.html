<!DOCTYPE html>
<html>
<head>
<title>Flights</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        color: white;
    }

    h2 {
        text-align: center;
        padding: 20px;
    }

    .container {
        width: 95%;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
    }

    .card {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px) scale(1.02);
    }

    .index {
        font-size: 12px;
        color: #aaa;
    }

    .airline {
        font-size: 20px;
        font-weight: bold;
        color: #00d4ff;
        margin-top: 5px;
    }

    .destination {
        margin-top: 8px;
    }

    .time {
        margin-top: 8px;
        font-weight: bold;
        color: #00ffcc;
    }

    .btn {
        display: inline-block;
        margin-top: 12px;
        padding: 8px 12px;
        background: #ff7b00;
        border-radius: 6px;
        color: white;
        text-decoration: none;
        font-size: 14px;
    }

    .btn:hover {
        background: #ffa94d;
    }
</style>
</head>

<body>

<h2>✈ Departures from {{airport}}</h2>

<div class="container">

{% for f in flights %}
<div class="card">

    <div class="index">#{{loop.index}}</div>

    <div class="airline">{{f.airline}}</div>

    <div class="destination">📍 {{f.to}}</div>

    <div class="time">🕒 {{f.departure}}</div>

    <a href="/predict/{{loop.index0}}/{{airport}}" class="btn">
        Check Delay
    </a>

</div>
{% endfor %}

</div>

</body>
