<!DOCTYPE html>
<html>
<head>
<title>Departures</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f5f5f5;
    color:#111;
}

h2{
    text-align:center;
    padding:22px;
    color:#111;
    font-size:34px;
    font-weight:800;
}

.top-bar{
    text-align:center;
    margin-bottom:20px;
}

input,button{
    padding:10px 12px;
    border-radius:10px;
    border:1px solid #dcdcdc;
    font-size:15px;
}

input{
    background:#fff;
    color:#111;
}

button{
    background:#111;
    color:#fff;
    border:none;
    cursor:pointer;
    font-weight:700;
}

.container{
    width:95%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#ffffff;
    border-radius:18px;
    padding:20px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    transition:.25s;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 24px rgba(0,0,0,.12);
}

.flight{
    font-size:24px;
    font-weight:800;
    color:#111;
}

.destination{
    margin-top:12px;
    color:#444;
    font-size:16px;
}

.time{
    margin-top:12px;
    font-size:18px;
    font-weight:800;
    color:#111;
}

.btn{
    margin-top:14px;
    padding:10px 14px;
    width:100%;
    background:#111;
    color:#fff;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
}

.departed{
    margin-top:14px;
    color:#111;
    font-weight:800;
    font-size:18px;
}

.back{
    text-align:center;
    margin:25px;
}

.back a{
    text-decoration:none;
    color:#111;
    font-weight:700;
}
</style>
</head>

<body>

<h2>✈ Departures - {{ airport }}</h2>

<div class="top-bar">
<form method="get">
<input type="date" name="date" value="{{ request.args.get('date','') }}" required>
<button type="submit">Filter</button>
</form>
</div>

<div class="container">

{% for flight in flights %}
<div class="card">

<div class="flight">{{ flight.number }}</div>

<div class="destination">📍 {{ flight.destination }}</div>

<div class="time">🕒 {{ flight.formatted_time }}</div>

{% if flight.is_future %}
<form action="/predict" method="post">
<input type="hidden" name="airline" value="{{ flight.airline.name }}">
<input type="hidden" name="origin" value="{{ airport }}">
<input type="hidden" name="destination" value="{{ flight.destination.split('(')[-1].replace(')','') if '(' in flight.destination else flight.destination }}">
<input type="hidden" name="time" value="{{ flight.formatted_time }}">
<input type="hidden" name="date" value="{{ flight.date }}">
<button type="submit" class="btn">Predict</button>
</form>
{% else %}
<div class="departed">✈ Departed</div>
{% endif %}

</div>
{% endfor %}

</div>

<div class="back">
<a href="{{ url_for('airports') }}">⬅ Back</a>
</div>

</body>
</html>
