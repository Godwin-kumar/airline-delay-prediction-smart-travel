<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    min-height:100vh;
    color:#fff;
    padding:40px;
}

.title{
    font-size:42px;
    font-weight:900;
    margin-bottom:28px;
    letter-spacing:.5px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
}

.card{
    background:rgba(255,255,255,.10);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.18);
    border-radius:24px;
    padding:28px;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 28px 50px rgba(0,0,0,.35);
}

.icon{
    font-size:34px;
    margin-bottom:14px;
}

.num{
    font-size:42px;
    font-weight:900;
    line-height:1;
}

.label{
    margin-top:10px;
    font-size:16px;
    color:rgba(255,255,255,.82);
}

.section{
    margin-top:34px;
}

.large-grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:22px;
}

.panel{
    background:rgba(255,255,255,.10);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.18);
    border-radius:24px;
    padding:24px;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.panel-title{
    font-size:24px;
    font-weight:800;
    margin-bottom:18px;
}

.map-box{
    height:320px;
    border-radius:18px;
    background:linear-gradient(135deg,#111827,#1d4ed8);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:700;
}

.list-item{
    padding:14px 0;
    border-bottom:1px solid rgba(255,255,255,.12);
    font-size:16px;
}

.list-item:last-child{
    border-bottom:none;
}

.badge{
    float:right;
    padding:4px 10px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
    background:#22c55e;
    color:#111;
}

.warn{ background:#f59e0b; }
.danger{ background:#ef4444; color:#fff; }

@media(max-width:980px){
    .large-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="title">✈ Premium Flight Dashboard</div>

<!-- TOP CARDS -->
<div class="grid">

<div class="card">
<div class="icon">✈</div>
<div class="num">248</div>
<div class="label">Flights Today</div>
</div>

<div class="card">
<div class="icon">✅</div>
<div class="num">91%</div>
<div class="label">On-Time Rate</div>
</div>

<div class="card">
<div class="icon">⏱</div>
<div class="num">32</div>
<div class="label">Predicted Delays</div>
</div>

<div class="card">
<div class="icon">🌍</div>
<div class="num">8</div>
<div class="label">Airports Covered</div>
</div>

</div>

<!-- SECOND SECTION -->
<div class="section">
<div class="large-grid">

<div class="panel">
<div class="panel-title">🗺 Live Flight Map</div>
<div class="map-box">
Map / Radar Section
</div>
</div>

<div class="panel">
<div class="panel-title">📢 Recent Predictions</div>

<div class="list-item">
MAA → DEL
<span class="badge">Low Delay</span>
</div>

<div class="list-item">
DEL → BLR
<span class="badge warn">Medium</span>
</div>

<div class="list-item">
HYD → MAA
<span class="badge danger">High</span>
</div>

<div class="list-item">
BOM → CCU
<span class="badge">Low</span>
</div>

</div>

</div>
</div>

</body>
</html>
