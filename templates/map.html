<!DOCTYPE html>
<html>
<head>
    <title>Live India Flight Radar</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
            overflow:hidden;
            background:#111;
        }

        #map{
            height:100vh;
            width:100%;
        }

        /* ================= PANEL ================= */

        #flightPanel{
            position:absolute;
            top:0;
            left:0;
            width:420px;
            height:100vh;

            background:#111;
            color:white;

            z-index:9999;

            transform:translateX(-100%);
            transition:0.35s ease;

            overflow-y:auto;

            border-right:1px solid rgba(255,255,255,0.08);

            box-shadow:
                0 0 30px rgba(0,0,0,0.6);
        }

        #flightPanel.active{
            transform:translateX(0);
        }

        /* ================= TOP IMAGE ================= */

        .flight-image{
            width:100%;
            height:180px;

            background-image:url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1200');
            background-size:cover;
            background-position:center;

            position:relative;
        }

        .flight-image::after{
            content:"";
            position:absolute;
            inset:0;

            background:
                linear-gradient(
                    to bottom,
                    rgba(0,0,0,0.1),
                    rgba(0,0,0,0.8)
                );
        }

        /* ================= CLOSE ================= */

        #closeBtn{
            position:absolute;
            top:18px;
            right:18px;

            width:38px;
            height:38px;

            border-radius:50%;

            background:rgba(255,255,255,0.12);

            display:flex;
            align-items:center;
            justify-content:center;

            cursor:pointer;

            font-size:20px;
            color:white;

            z-index:10;

            backdrop-filter:blur(10px);
        }

        /* ================= CONTENT ================= */

        #flightContent{
            padding:22px;
        }

        /* ================= FLIGHT NUMBER ================= */

        .flight-number{
            font-size:56px;
            font-weight:800;

            color:#ffd400;

            margin-bottom:8px;
        }

        .airline{
            font-size:22px;
            font-weight:600;

            margin-bottom:30px;
        }

        /* ================= ROUTE BOX ================= */

        .route-box{
            background:#1a1a1a;

            border-radius:22px;

            padding:26px;

            margin-bottom:22px;

            box-shadow:
                inset 0 0 0 1px rgba(255,255,255,0.04);
        }

        .route{
            font-size:52px;
            font-weight:800;

            text-align:center;

            margin-bottom:14px;
        }

        .route-sub{
            display:flex;
            justify-content:space-between;

            font-size:14px;
            color:#9a9a9a;
        }

        /* ================= INFO CARDS ================= */

        .info-card{
            background:#1a1a1a;

            border-radius:18px;

            padding:18px 20px;

            margin-bottom:18px;

            font-size:22px;

            box-shadow:
                inset 0 0 0 1px rgba(255,255,255,0.04);
        }

        .status-green{
            color:#1ed760;
            font-weight:700;
        }

        /* ================= SEARCH ================= */

        .search-bar{
            position:absolute;

            top:18px;
            left:50%;

            transform:translateX(-50%);

            width:340px;
            height:52px;

            background:#1f1f1f;

            border-radius:18px;

            z-index:999;

            display:flex;
            align-items:center;

            padding:0 20px;

            color:#aaa;

            font-size:18px;

            box-shadow:
                0 4px 20px rgba(0,0,0,0.35);
        }

    </style>
</head>

<body>


    <div id="map"></div>

    <div id="flightPanel">

        <div class="flight-image"></div>

        <span id="closeBtn">✕</span>

        <div id="flightContent">

            <div class="flight-number">
                6E 5056
            </div>

            <div class="airline">
                IndiGo
            </div>

            <div class="route-box">

                <div class="route">
                    BOM ✈ HYD
                </div>

                <div class="route-sub">
                    <span>Departure</span>
                    <span>Arrival</span>
                </div>

            </div>

            <div class="info-card">
                ✈ Aircraft: Airbus A320
            </div>

            <div class="info-card">
                📡 Status:
                <span class="status-green">Departed</span>
            </div>

            <div class="info-card">
                📍 Route: BOM → HYD
            </div>

        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/map.js"></script>

</body>
</html>
