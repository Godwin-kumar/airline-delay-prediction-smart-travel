<!DOCTYPE html>
<html>
<head>
<title>Flights</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f5f5f5;
    color:#111;
}

h2{
    text-align:center;
    padding:20px;
    font-size:34px;
    font-weight:800;
    color:#111;
}

.container{
    width:95%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding-bottom:35px;
}

.card{
    background:#ffffff;
    border:1px solid #e5e5e5;
    border-radius:18px;
    padding:20px;
    box-shadow:0 8px 22px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 14px 30px rgba(0,0,0,.12);
}

.flight{
    font-size:28px;
    font-weight:800;
    margin-bottom:14px;
    color:#111;
}

.info{
    font-size:17px;
    margin:10px 0;
    color:#444;
}

.time{
    font-size:20px;
    font-weight:800;
    color:#111;
}

.predict-btn{
    margin-top:14px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#111;
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
}

.predict-btn:hover{
    background:#000;
}

.departed{
    margin-top:14px;
    color:#111;
    font-weight:800;
    font-size:18px;
}
</style>
</head>

<body>

<h2>✈ Flights {{ origin }} → {{ destination }}</h2>

<div class="container">

{% for flight in flights %}
<div class="card">

<div class="flight">{{ flight.number }}</div>

<div class="info">📍 {{ flight.destination }}</div>

<div class="info time">🕒 {{ flight.formatted_time }}</div>

{% if flight.is_future %}

<form action="/predict" method="post">
<input type="hidden" name="airline" value="{{ flight.airline.name }}">
<input type="hidden" name="origin" value="{{ origin }}">
<input type="hidden" name="destination" value="{{ destination }}">
<input type="hidden" name="time" value="{{ flight.formatted_time }}">
<input type="hidden" name="date" value="{{ date }}">
<button class="predict-btn">Predict</button>
</form>

{% else %}

<div class="departed">✈ Departed</div>

{% endif %}

</div>
{% endfor %}

</div>

</body>
</html>
